<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quest HQ — Customizable Command Center Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap">
<style>
:root{
  --amber:#ED4E0D; --ink:#15181d; --mut:#6b7280; --mut2:#9aa3b2;
  --bg:#eef0f3; --card:#ffffff; --line:#e6e8ec; --soft:0 1px 2px rgba(17,24,39,.05);
  --green:#16a34a; --blue:#2563eb; --violet:#7c3aed; --gold:#d97706; --red:#dc2626;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:14px}
.mono{font-family:'JetBrains Mono',monospace}
h1,h2,h3{margin:0}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1320px;margin:0 auto;padding:18px}

/* Top bar */
.topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:17px}
.brand .logo{width:34px;height:34px;border-radius:9px;background:var(--amber);display:grid;place-items:center;color:#fff;font-weight:900}
.brand small{display:block;font-size:10px;letter-spacing:.12em;color:var(--mut2);font-weight:800;text-transform:uppercase}
.spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 13px;font-weight:700;font-size:13px;color:var(--ink)}
.btn:hover{border-color:var(--amber)}
.btn.primary{background:var(--amber);border-color:transparent;color:#fff}
.btn.primary:hover{background:#ff5b18}
.btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* Role tabs */
.roles{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:5px}
.roles button{border:none;background:transparent;border-radius:8px;padding:8px 15px;font-weight:800;font-size:13px;color:var(--mut)}
.roles button.on{background:var(--amber);color:#fff}

/* Filters */
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 14px;margin-bottom:16px;box-shadow:var(--soft)}
.filters label{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--mut2)}
.filters select{font-family:inherit;font-weight:700;font-size:13px;border:1px solid var(--line);border-radius:9px;padding:8px 11px;background:#fff;color:var(--ink)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:none;background:#fff;padding:8px 12px;font-weight:700;font-size:12.5px;color:var(--mut)}
.seg button.on{background:var(--amber);color:#fff}
.filters .fdivider{width:1px;height:26px;background:var(--line)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;align-items:start}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--soft);padding:18px;min-width:0}
.card.span2{grid-column:1 / -1}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.card-h h3{font-size:15px;font-weight:800}
.card-h p{margin:2px 0 0;font-size:12px;color:var(--mut);font-weight:500}
.card-h .ctools{display:flex;align-items:center;gap:6px}
.drag-handle,.rm{display:none;border:1px solid var(--line);background:#fff;border-radius:8px;width:30px;height:30px;align-items:center;justify-content:center;color:var(--mut)}
.editing .drag-handle,.editing .rm{display:inline-flex}
.rm:hover{border-color:var(--red);color:var(--red)}
.drag-handle{cursor:grab}
.editing .card{outline:1.5px dashed #d8b8a6;outline-offset:3px}
.card.dragging{opacity:.5}
.chiplink{font-size:12px;font-weight:700;color:var(--amber);text-decoration:none}

/* KPI tiles */
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.kpi{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:13px;padding:14px}
.kpi .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto}
.kpi .ic svg{width:20px;height:20px;stroke-width:2}
.kpi b{font-size:23px;font-weight:900;line-height:1}
.kpi .lab{font-size:12px;color:var(--mut);font-weight:700}
.kpi .sub{font-size:11px;color:var(--mut2);font-weight:600;margin-top:2px}

/* Leaderboard */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--mut2);font-weight:800;padding:0 10px 9px;border-bottom:1px solid var(--line)}
th.num,td.num{text-align:right}
td{padding:11px 10px;border-bottom:1px solid #f1f3f6;font-size:13.5px;font-weight:600}
tr:last-child td{border-bottom:none}
tr.me{background:#fff7f2}
.repcell{display:flex;align-items:center;gap:10px}
.av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;flex:0 0 auto}
.repcell small{display:block;color:var(--mut2);font-weight:600;font-size:11px}
.rank{width:22px;color:var(--mut2);font-weight:800;text-align:center}
.tag{display:inline-block;font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px}
.tag.g{background:#dcfce7;color:#15803d}.tag.a{background:#fef3c7;color:#b45309}.tag.r{background:#fee2e2;color:#b91c1c}

/* bars */
.bars{display:grid;gap:11px}
.bar-row{display:grid;grid-template-columns:96px minmax(0,1fr) auto;align-items:center;gap:11px}
.bar-row .n{font-size:12.5px;font-weight:700;color:#374151;display:flex;align-items:center;gap:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
.track{height:10px;border-radius:6px;background:#f1f3f6;overflow:hidden}
.track i{display:block;height:100%;border-radius:6px;min-width:3px}
.bar-row .v{font-size:12.5px;font-weight:800;text-align:right;white-space:nowrap}
.bar-row .v small{display:block;font-size:10px;font-weight:600;color:var(--mut2)}

/* column chart */
.cols{display:flex;align-items:flex-end;gap:8px;height:140px;padding-top:8px}
.col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.col .barv{width:70%;background:linear-gradient(180deg,#ED4E0D,#ff7a3c);border-radius:6px 6px 3px 3px;min-height:4px}
.col .cl{font-size:11px;color:var(--mut2);font-weight:700}
.col .cv{font-size:11px;font-weight:800}

/* donut */
.donut-wrap{display:flex;align-items:center;gap:18px}
.donut{position:relative;width:128px;height:128px;border-radius:50%;flex:0 0 auto}
.donut .hole{position:absolute;inset:20px;background:#fff;border-radius:50%;display:grid;place-items:center;text-align:center}
.donut .hole b{font-size:24px;font-weight:900;line-height:1}
.donut .hole small{font-size:11px;color:var(--mut2);font-weight:700}
.legend{display:grid;gap:8px;flex:1 1 auto;min-width:0}
.legend div{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:#374151}
.legend b{font-weight:800}

/* funnel */
.funnel{display:grid;gap:9px}
.frow{display:grid;grid-template-columns:90px minmax(0,1fr) auto;align-items:center;gap:11px}
.frow .fl{font-size:12.5px;font-weight:700;color:#374151}
.ftrack{height:26px;border-radius:8px;background:#f1f3f6;overflow:hidden;display:flex;align-items:center}
.ftrack i{height:100%;border-radius:8px;display:flex;align-items:center;padding:0 9px;color:#fff;font-size:12px;font-weight:800;min-width:34px}
.frow .fv{font-size:12px;font-weight:800;color:var(--mut);white-space:nowrap}

/* dispatch */
.disp{display:grid;gap:9px}
.disp .row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:11px}
.disp .crew{font-size:11px;font-weight:800;color:#fff;background:var(--ink);border-radius:7px;padding:5px 9px;white-space:nowrap}
.disp .jb{font-weight:700;font-size:13.5px}
.disp .jb small{display:block;color:var(--mut2);font-weight:600;font-size:11.5px}
.disp .st{font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px}

/* weather */
.wx{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.wx .d{border:1px solid var(--line);border-radius:12px;padding:12px 6px;text-align:center}
.wx .d .dn{font-size:11px;font-weight:800;color:var(--mut)}
.wx .d .em{font-size:26px;margin:4px 0}
.wx .d .hi{font-weight:900}
.wx .d .lo{color:var(--mut2);font-weight:700;font-size:12px}
.wx .d.alert{background:#fff7f2;border-color:#f6c9b1}
.wx .d .warn{font-size:9.5px;font-weight:800;color:var(--amber);margin-top:3px}

/* reviews */
.rev{display:flex;align-items:center;gap:18px}
.rev .big{font-size:42px;font-weight:900;line-height:1}
.stars{color:#f4b400;font-size:16px;letter-spacing:1px}
.rev .meta{display:grid;gap:6px;font-size:13px;font-weight:600;color:#374151}
.rev .meta b{font-weight:800}
.vd{display:flex;flex-direction:column;gap:6px}
.vd .row1{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.vd .big{font-size:30px;font-weight:900;line-height:1}
.vd .sub{font-size:12px;color:var(--mut);font-weight:600}
.vd .tgt{height:9px;border-radius:5px;background:#f1f3f6;overflow:hidden;margin-top:6px}
.vd .tgt i{display:block;height:100%;border-radius:5px}
.vrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:8px 0;border-bottom:1px solid #f1f3f6}
.vrow:last-child{border-bottom:none}
.vrow b{font-weight:800}

/* add-widget tray */
.tray{display:none;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:var(--soft)}
.tray.open{display:block}
.tray h3{font-size:14px;margin-bottom:4px}
.tray p.sub{margin:0 0 12px;color:var(--mut);font-size:12.5px}
.tray .grp{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--mut2);margin:12px 0 8px}
.tray .opts{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px}
.wopt{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:11px;padding:11px 12px}
.wopt .t{font-weight:700;font-size:13px}
.wopt .t small{display:block;color:var(--mut2);font-weight:600;font-size:11px}
.wopt button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 11px;font-weight:800;font-size:12px;color:var(--amber)}
.wopt button.added{background:#f3f4f6;color:var(--mut2);border-color:transparent}

.muted{color:var(--mut2);font-size:12px;font-weight:600}
.foot{color:var(--mut2);font-size:12px;text-align:center;padding:26px 0 8px}
@media(max-width:840px){.grid{grid-template-columns:1fr}.card.span2{grid-column:auto}.kpis{grid-template-columns:repeat(2,1fr)}.wx{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

  trophy:'<path d="M7 4h10v4a5 5 0 01-10 0zM5 4H3v2a3 3 0 003 3M19 4h2v2a3 3 0 01-3 3M9 20h6M12 13v7"/>',
};
const svg=p=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
const money=n=>'$'+Math.round(n).toLocaleString();
const av=r=>`<span class="av" style="background:${r.color}">${r.initials}</span>`;
function dpct(cur,prev){return prev?Math.round((cur-prev)/prev*100):0;}
function deltaChip(cur,prev,invert){const d=dpct(cur,prev);const up=d>=0;const good=invert?!up:up;const col=good?'#16a34a':'#dc2626';return `<span style="font-size:11.5px;font-weight:800;color:${col}">${up?'▲':'▼'} ${Math.abs(d)}%</span>`;}
function spark(vals,color){const m=Math.max(...vals);return `<span style="display:inline-flex;align-items:flex-end;gap:3px;height:24px;vertical-align:middle">${vals.map(v=>`<i style="display:block;width:6px;height:${Math.max(Math.round(v/m*24),3)}px;background:${color};border-radius:2px;opacity:.85"></i>`).join('')}</span>`;}

/* ---------------- state ---------------- */

  ops:['jobs','dispatch','weather','kpis','revenue'],
  scale:['pipelineCoverage','utilization','recruiting','quota','turnover','cash13','dso','jobCostVariance','ltvCac','recurring','ownerScore','serviceMix','scorecard'],
  eos:['rocks','scorecard','oneYearPlan','l10pulse','issues','todos','peopleAnalyzer','eosComponents','coreValues']
};
let layout={exec:[...DEFAULTS.exec],sales:[...DEFAULTS.sales],ops:[...DEFAULTS.ops],scale:[...DEFAULTS.scale],eos:[...DEFAULTS.eos]};

/* selected reps after filter */
function pool(){ return REP==='all'?REPS:REPS.filter(r=>r.id===REP); }
function tot(k){ return pool().reduce((s,r)=>s+r[k],0); }
function scaled(v){ return Math.round(v*SCALE[RANGE]); }

const WIDGETS={

      ${tile(IC.doc,'#ED4E0D',props,'Proposals sent','avg '+money(18500))}
      ${tile(IC.cash,'#7c3aed',money(rev),'Revenue won',scaled(tot('won'))+' jobs')}
    </div>`;
  }},
  leaderboard:{title:'Rep leaderboard',group:'Sales',span:true,render(){
    const rows=[...REPS].sort((a,b)=>b.revenue-a.revenue).map((r,i)=>{

  serviceMix:{title:'Revenue by service line',group:'Strategy',sub:'Diversification & where to scale',render(){
    const max=Math.max(...MIX.map(m=>m.v));
    return `<div class="bars">${MIX.map(m=>`<div class="bar-row"><span class="n"><span class="dot" style="background:${m.c}"></span>${m.l}</span><span class="track"><i style="width:${Math.round(m.v/max*100)}%;background:${m.c}"></i></span><span class="v">${m.v}%</span></div>`).join('')}</div>`;
  }},
  rocks:{title:'Quarterly Rocks',group:'EOS',span:true,sub:ROCKS.quarter+' priorities · '+ROCKS.onTrack+' of '+ROCKS.total+' on track',render(){
    return `<div class="bars">${ROCKS.list.map(r=>`<div class="bar-row" style="grid-template-columns:minmax(0,1fr) 120px auto"><span class="n" style="white-space:normal;display:block">${r.r}<small style="display:block;color:#9aa3b2;font-weight:600">${r.owner}</small></span><span class="track"><i style="width:${r.pct}%;background:${r.st==='on'?'#16a34a':'#dc2626'}"></i></span><span class="v"><span class="tag ${r.st==='on'?'g':'r'}">${r.st==='on'?'On track':'Off track'}</span></span></div>`).join('')}</div>`;
  }},
  issues:{title:'Issues list (IDS)',group:'EOS',sub:ISSUES.open+' open · '+ISSUES.solvedWk+' solved this week',render(){
    const pc={High:'r',Med:'a',Low:'g'};
    return `<div>${ISSUES.list.map(x=>`<div class="vrow"><span>${x.i}</span><span class="tag ${pc[x.p]}">${x.p}</span></div>`).join('')}</div>`;
  }},
  todos:{title:'To-dos (7-day)',group:'EOS',sub:'Action items from last L10',render(){
    const pct=Math.round(TODOS.done/TODOS.total*100);
    return `<div class="vd"><div class="row1"><span class="big">${pct}%</span><span class="sub">${TODOS.done}/${TODOS.total} done</span></div>
      <div class="tgt" style="height:10px"><i style="width:${pct}%;background:#16a34a"></i></div>
      <div style="margin-top:8px">${TODOS.list.map(t=>`<div class="vrow"><span class="sub">${t.done?'✓':'○'} ${t.t}</span><b style="font-size:12px;color:#9aa3b2">${t.who}</b></div>`).join('')}</div></div>`;
  }},
  l10pulse:{title:'L10 meeting pulse',group:'EOS',sub:'Weekly leadership meeting',render(){
    return `<div class="vd"><div class="row1"><span class="big">${L10.rating}<span style="font-size:16px">/10</span></span>${deltaChip(L10.rating,L10.prevRating)}</div>
      <div class="vrow"><span class="sub">Attendance</span><b>${L10.attendance}</b></div>
      <div class="vrow"><span class="sub">Started on time</span><b style="color:${L10.onTime?'#16a34a':'#dc2626'}">${L10.onTime?'Yes':'No'}</b></div>
      <div class="vrow"><span class="sub">Weeks streak</span><b>${L10.streak}</b></div></div>`;
  }},
  peopleAnalyzer:{title:'People Analyzer (GWC)',group:'EOS',span:true,sub:'Right people, right seats · core values + Get it / Want it / Capacity',render(){
    const cell=v=>v===true?'<span style="color:#16a34a;font-weight:800">✓</span>':v==='?'?'<span style="color:#d97706;font-weight:800">?</span>':'<span style="color:#dc2626;font-weight:800">✗</span>';
    const cv=v=>v==='+'?'<span class="tag g">+</span>':v==='±'?'<span class="tag a">±</span>':'<span class="tag r">−</span>';
    return `<table><thead><tr><th>Team member</th><th>Seat</th><th class="num">Values</th><th class="num">Get it</th><th class="num">Want it</th><th class="num">Capacity</th></tr></thead><tbody>${PEOPLE.map(p=>`<tr><td>${p.name}</td><td>${p.role}</td><td class="num">${cv(p.cv)}</td><td class="num">${cell(p.g)}</td><td class="num">${cell(p.w)}</td><td class="num">${cell(p.c)}</td></tr>`).join('')}</tbody></table>`;
  }},
  eosComponents:{title:'EOS components checkup',group:'EOS',sub:'Six key components health',render(){
    return `<div class="bars">${COMPONENTS.map(c=>{const col=c.v>=80?'#16a34a':c.v>=65?'#d97706':'#dc2626';return `<div class="bar-row"><span class="n">${c.c}</span><span class="track"><i style="width:${c.v}%;background:${col}"></i></span><span class="v">${c.v}%</span></div>`;}).join('')}</div>
      <div class="sub" style="margin-top:8px">Strengthen your weakest component first.</div>`;
  }},
  oneYearPlan:{title:'1-Year Plan',group:'EOS',sub:PLAN.year+' goals & pace',render(){
    const rp=Math.round(PLAN.revActual/PLAN.revGoal*100),pp=Math.round(PLAN.profitActual/PLAN.profitGoal*100);
    return `<div class="vd">
      <div class="vrow"><span class="sub">Revenue · ${money(PLAN.revGoal)}</span><b>${money(PLAN.revActual)} (${rp}%)</b></div>
      <div class="tgt"><i style="width:${rp}%;background:#ED4E0D"></i></div>
      <div class="vrow" style="margin-top:8px"><span class="sub">Net profit · ${money(PLAN.profitGoal)}</span><b>${money(PLAN.profitActual)} (${pp}%)</b></div>
      <div class="tgt"><i style="width:${pp}%;background:#16a34a"></i></div>
      <div class="sub" style="margin-top:8px">~50% of year elapsed — pace ${rp>=48?'on track':'behind'}.</div></div>`;
  }},
  coreValues:{title:'Core values',group:'EOS',sub:'What we hire, fire & reward on',render(){
    return `<div style="display:flex;flex-wrap:wrap;gap:8px">${VALUES.map(v=>`<span style="background:#fff7f2;border:1px solid #f6c9b1;color:#b8430f;font-weight:800;font-size:12.5px;padding:8px 12px;border-radius:999px">${v}</span>`).join('')}</div>`;
  }},
};
const GROUPS=['Value drivers','Growth','Capacity','People','Cash flow','Strategy','EOS','Sales','Operations','Finance','Reputation'];

/* ---------------- render ---------------- */
const grid=document.getElementById('grid');
function render(){
  document.getElementById('ctx').textContent=`${REP==='all'?'Whole team':REPS.find(r=>r.id===REP).name} · ${({today:'Today',week:'This week',month:'This month',quarter:'This quarter'})[RANGE]}`;
  grid.innerHTML=layout[ROLE].map(id=>{
    const w=WIDGETS[id];if(!w)return'';
    return `<section class="card ${w.span?'span2':''}" draggable="${EDIT}" data-id="${id}">
      <div class="card-h"><div><h3>${w.title}</h3>${w.sub?`<p>${w.sub}</p>`:''}</div>
        <div class="ctools"><button class="rm" data-rm="${id}" title="Remove">✕</button><span class="drag-handle" title="Drag">⋮⋮</span></div></div>
      ${w.render()}</section>`;
  }).join('');
  bindDrag();
  document.body.classList.toggle('editing',EDIT);
}

/* add-widget tray */
function renderTray(){
  const active=new Set(layout[ROLE]);
  const tray=document.getElementById('tray');
  tray.innerHTML=`<h3>Add widgets to your ${ROLE} dashboard</h3><p class="sub">Click to add. Remove with the ✕ on any card in Customize mode. Drag cards to rearrange.</p>`+
    GROUPS.map(g=>{
      const items=Object.entries(WIDGETS).filter(([id,w])=>w.group===g);
      if(!items.length)return'';
      return `<div class="grp">${g}</div><div class="opts">`+items.map(([id,w])=>{
        const on=active.has(id);
        return `<div class="wopt"><div class="t">${w.title}<small>${w.sub||''}</small></div><button data-add="${id}" class="${on?'added':''}">${on?'Added':'＋ Add'}</button></div>`;
      }).join('')+`</div>`;
    }).join('');
}

/* drag reorder */
let dragId=null;
function bindDrag(){
  grid.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('dragstart',e=>{dragId=c.dataset.id;c.classList.add('dragging');});
    c.addEventListener('dragend',()=>{dragId=null;c.classList.remove('dragging');});
    c.addEventListener('dragover',e=>{e.preventDefault();});
    c.addEventListener('drop',e=>{e.preventDefault();const tgt=c.dataset.id;if(!dragId||dragId===tgt)return;
      const arr=layout[ROLE];arr.splice(arr.indexOf(dragId),1);arr.splice(arr.indexOf(tgt),0,dragId);render();});
  });
}

/* events */
document.getElementById('roles').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#roles button').forEach(x=>x.classList.remove('on'));b.classList.add('on');ROLE=b.dataset.role;renderTray();render();});
document.getElementById('rangeSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#rangeSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');RANGE=b.dataset.r;render();});
document.getElementById('repSel').addEventListener('change',e=>{REP=e.target.value;render();});
document.getElementById('editBtn').addEventListener('click',e=>{EDIT=!EDIT;e.target.classList.toggle('on',EDIT);e.target.textContent=EDIT?'✓ Done':'✎ Customize';render();});
document.getElementById('addBtn').addEventListener('click',()=>{const t=document.getElementById('tray');t.classList.toggle('open');renderTray();});
document.getElementById('tray').addEventListener('click',e=>{const b=e.target.closest('[data-add]');if(!b)return;
  const id=b.dataset.add;const arr=layout[ROLE];if(!arr.includes(id)){arr.push(id);render();}renderTray();});
grid.addEventListener('click',e=>{const b=e.target.closest('[data-rm]');if(!b)return;
  const id=b.dataset.rm;layout[ROLE]=layout[ROLE].filter(x=>x!==id);render();renderTray();});

/* init */
document.getElementById('repSel').innerHTML='<option value="all">Whole team</option>'+REPS.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');
render();
</script>
</body>
</html>
